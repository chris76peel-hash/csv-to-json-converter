<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSV to JSON Converter</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #f1f5f9;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 32px 24px;
}
.card {
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.10);
  padding: 36px 40px;
  width: 100%;
  max-width: 680px;
  text-align: center;
}
h1 { font-size: 22px; font-weight: 700; color: #1e293b; margin-bottom: 6px; }
.subtitle { font-size: 14px; color: #64748b; margin-bottom: 28px; }
.subtitle span { color: #2563eb; font-weight: 600; }

#dropzone {
  border: 2.5px dashed #93c5fd;
  border-radius: 10px;
  padding: 40px 24px;
  cursor: pointer;
  transition: all 0.2s;
  background: #f8faff;
}
#dropzone.drag-over  { border-color: #2563eb; background: #dbeafe; }
#dropzone.converting { border-color: #f59e0b; background: #fffbeb; }
#dropzone.success    { border-color: #16a34a; background: #f0fdf4; padding: 18px 24px; }
#dropzone.error      { border-color: #dc2626; background: #fef2f2; }

.drop-icon  { font-size: 44px; margin-bottom: 12px; display: block; }
.drop-title { font-size: 16px; font-weight: 600; color: #1e293b; margin-bottom: 6px; }
.drop-hint  { font-size: 13px; color: #64748b; }
.file-name  { font-size: 13px; font-weight: 600; color: #2563eb; margin-top: 6px; }
.result-count { font-size: 13px; color: #16a34a; font-weight: 600; margin-top: 3px; }
.error-msg  { font-size: 13px; color: #dc2626; font-weight: 600; margin-top: 4px; }

.spinner {
  width: 36px; height: 36px;
  border: 4px solid #fde68a; border-top-color: #f59e0b;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }

#output-panel { margin-top: 20px; text-align: left; display: none; }
.output-header {
  display: flex; align-items: center;
  justify-content: space-between; margin-bottom: 8px;
}
.output-label {
  font-size: 13px; font-weight: 600; color: #475569;
  text-transform: uppercase; letter-spacing: 0.05em;
}
.output-meta { font-size: 12px; color: #94a3b8; }

#json-output {
  width: 100%; min-height: 260px; max-height: 480px;
  padding: 14px 16px;
  border: 1.5px solid #e2e8f0; border-radius: 8px;
  background: #f8fafc;
  font-family: 'Cascadia Code', 'Fira Mono', 'Consolas', monospace;
  font-size: 12.5px; line-height: 1.6; color: #1e293b;
  resize: vertical; outline: none;
}
#json-output:focus { border-color: #2563eb; background: #fff; }

.btn-row { margin-top: 14px; display: flex; gap: 10px; flex-wrap: wrap; }
.btn {
  padding: 9px 20px; border-radius: 7px; font-size: 13.5px;
  font-weight: 600; cursor: pointer; border: none;
  display: inline-flex; align-items: center; gap: 6px;
}
.btn:hover { opacity: 0.85; }
.btn-copy     { background: #2563eb; color: #fff; flex: 1; justify-content: center; }
.btn-copy.copied { background: #16a34a; }
.btn-download { background: #e2e8f0; color: #1e293b; }
.btn-reset    { background: #f1f5f9; color: #64748b; margin-left: auto; }

.info-strip {
  margin-top: 24px; padding: 11px 15px;
  background: #f0f4fa; border-radius: 8px;
  font-size: 12px; color: #475569; text-align: left; line-height: 1.7;
}
.info-strip strong { color: #1e293b; }
</style>
</head>
<body>
<div class="card">
  <h1>CSV to JSON Converter</h1>
  <p class="subtitle">Extracts all <span>CALL.*</span> columns and formats them for import</p>

  <div id="dropzone">
    <div id="dropContent">
      <span class="drop-icon">&#128194;</span>
      <div class="drop-title">Drop your CSV file here</div>
      <div class="drop-hint">or click to browse</div>
    </div>
  </div>

  <div id="output-panel">
    <div class="output-header">
      <span class="output-label">JSON Output</span>
      <span class="output-meta" id="output-meta"></span>
    </div>
    <textarea id="json-output" readonly spellcheck="false"></textarea>
    <div class="btn-row">
      <button class="btn btn-copy" id="copyBtn" onclick="copyJSON()"><span id="copyText">Copy to clipboard</span></button>
      <button class="btn btn-download" onclick="downloadJSON()">Download .json</button>
      <button class="btn btn-reset" onclick="doReset()">Clear</button>
    </div>
  </div>

  <div class="info-strip" id="infoStrip">
    <strong>How it works:</strong> Drop any CSV with columns starting with <strong>CALL.</strong> and the JSON will appear below to copy and paste.
  </div>
</div>

<input type="file" id="fileInput" accept=".csv" style="display:none">

<script>
var dz=document.getElementById('dropzone');
var dc=document.getElementById('dropContent');
var fi=document.getElementById('fileInput');
var op=document.getElementById('output-panel');
var jo=document.getElementById('json-output');
var om=document.getElementById('output-meta');
var is=document.getElementById('infoStrip');
var lastBlob=null;

dz.addEventListener('click',function(){fi.click();});
fi.addEventListener('change',function(){if(fi.files&&fi.files[0])processFile(fi.files[0]);});
dz.addEventListener('dragenter',function(e){e.preventDefault();e.stopPropagation();dz.classList.add('drag-over');});
dz.addEventListener('dragover',function(e){e.preventDefault();e.stopPropagation();dz.classList.add('drag-over');});
dz.addEventListener('dragleave',function(e){e.preventDefault();e.stopPropagation();dz.classList.remove('drag-over');});
dz.addEventListener('drop',function(e){e.preventDefault();e.stopPropagation();dz.classList.remove('drag-over');var f=e.dataTransfer&&e.dataTransfer.files?e.dataTransfer.files[0]:null;if(f)processFile(f);});

function processFile(file){
  if(!file.name.toLowerCase().match(/\.csv$/)){showError('Please select a .csv file.');return;}
  dz.className='converting';
  dc.innerHTML='<div class="spinner"></div><div class="drop-title">Converting...</div><div class="file-name">'+esc(file.name)+'</div>';
  op.style.display='none';
  var reader=new FileReader();
  reader.onload=function(ev){
    try{
      var records=parseCSV(ev.target.result);
      if(!records){showError('No CALL.* columns found.');return;}
      if(records.length===0){showError('No data rows found.');return;}
      var json=JSON.stringify(records,null,2);
      var outName=file.name.replace(/\.csv$/i,'.json');
      dz.className='success';
      dc.innerHTML='<div class="drop-title" style="font-size:14px">'+esc(file.name)+'</div><div class="result-count">'+records.length+' records converted</div>';
      jo.value=json;
      om.textContent=records.length+' records, '+json.length+' chars';
      op.style.display='block';
      is.style.display='none';
      lastBlob={json:json,name:outName};
      jo.focus();jo.select();
    }catch(err){showError('Error: '+err.message);}
  };
  reader.readAsText(file,'utf-8');
}

function parseCSV(text){
  if(text.charCodeAt(0)===0xFEFF)text=text.slice(1);
  var lines=text.split(/\r?\n/);
  function parseLine(line){
    var fields=[],cur='',inQ=false;
    for(var i=0;i<line.length;i++){
      var c=line[i];
      if(inQ){if(c=='"'&&line[i+1]=='"'){cur+='"';i++;}else if(c=='"')inQ=false;else cur+=c;}
      else{if(c=='"')inQ=true;else if(c==','){fields.push(cur);cur='';}else cur+=c;}
    }
    fields.push(cur);return fields;
  }
  var headers=parseLine(lines[0]);
  var callCols=[];
  for(var i=0;i<headers.length;i++){if(headers[i].trim().toUpperCase().indexOf('CALL.')===0)callCols.push({name:headers[i].trim(),idx:i});}
  if(callCols.length===0)return null;
  var results=[];
  for(var r=1;r<lines.length;r++){
    var line=lines[r].trim();if(!line)continue;
    var fields=parseLine(line),data={};
    for(var c=0;c<callCols.length;c++)data[callCols[c].name]=(fields[callCols[c].idx]||'').trim();
    results.push({action:'A',data:data});
  }
  return results;
}

function copyJSON(){
  if(!jo.value)return;
  var btn=document.getElementById('copyBtn'),lbl=document.getElementById('copyText');
  function done(){btn.classList.add('copied');lbl.textContent='Copied!';setTimeout(function(){btn.classList.remove('copied');lbl.textContent='Copy to clipboard';},2000);}
  if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(jo.value).then(done).catch(function(){jo.select();document.execCommand('copy');done();});
  else{jo.select();document.execCommand('copy');done();}
}

function downloadJSON(){
  if(!lastBlob)return;
  var blob=new Blob([lastBlob.json],{type:'application/json'});
  var url=URL.createObjectURL(blob),a=document.createElement('a');
  a.href=url;a.download=lastBlob.name;document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(function(){URL.revokeObjectURL(url);},3000);
}

function doReset(){
  dz.className='';fi.value='';
  dc.innerHTML='<span class="drop-icon">&#128194;</span><div class="drop-title">Drop your CSV file here</div><div class="drop-hint">or click to browse</div>';
  op.style.display='none';is.style.display='';lastBlob=null;
}

function showError(msg){
  dz.className='error';
  dc.innerHTML='<div class="drop-title">Could not convert</div><div class="error-msg">'+esc(msg)+'</div><button class="btn btn-download" onclick="doReset()" style="margin-top:12px">Try again</button>';
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>
</body>
</html>
